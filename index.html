<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字検定 学習アプリ - 2字熟語対策</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        input, textarea, button {
            -webkit-user-select: text;
            user-select: text;
        }
        body {
            font-family: 'Segoe UI', 'ヒラギノ角ゴ Pro', 'Hiragino Kaku Gothic Pro', 'YuGothic', 'Yu Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 2文字熟語データ
        const kokugoData = [
            { id: 1, kanji: '愛情', yomi: 'あいじょう', imi: '相手を思い大事にする気持ち' },
            { id: 2, kanji: '安全', yomi: 'あんぜん', imi: '危険がなく安心な状態' },
            { id: 3, kanji: '一生', yomi: 'いっしょう', imi: '生まれてから死ぬまでの間' },
            { id: 4, kanji: '運命', yomi: 'うんめい', imi: '人が逃れられない定められた運' },
            { id: 5, kanji: '幸せ', yomi: 'しあわせ', imi: '心が満足して喜んでいる状態' },
            { id: 6, kanji: '努力', yomi: 'どりょく', imi: '目的のために力を尽くす' },
            { id: 7, kanji: '希望', yomi: 'きぼう', imi: '将来が良くなることを期待する気持ち' },
            { id: 8, kanji: '成功', yomi: 'せいこう', imi: '目的を達成すること' },
            { id: 9, kanji: '失敗', yomi: 'しっぱい', imi: '望んだことが実現しないこと' },
            { id: 10, kanji: '友情', yomi: 'ゆうじょう', imi: '友人同士の深い信頼と愛情' },
            { id: 11, kanji: '知識', yomi: 'ちしき', imi: '学んで得た情報や理解' },
            { id: 12, kanji: '才能', yomi: 'さいのう', imi: '生まれつき備わった優れた能力' },
            { id: 13, kanji: '勇気', yomi: 'ゆうき', imi: '恐れや危険に立ち向かう心' },
            { id: 14, kanji: '正義', yomi: 'せいぎ', imi: '道理にかなった正しいこと' },
            { id: 15, kanji: '誠実', yomi: 'せいじつ', imi: '心が真っすぐで嘘のないこと' },
            { id: 16, kanji: '信頼', yomi: 'しんらい', imi: '相手を信じて頼ること' },
            { id: 17, kanji: '責任', yomi: 'せきにん', imi: '自分がしたことに対する義務' },
            { id: 18, kanji: '自由', yomi: 'じゆう', imi: '束縛されず自分の意志で行動すること' },
            { id: 19, kanji: '進歩', yomi: 'しんぽ', imi: '前へ進み段階的に良くなること' },
            { id: 20, kanji: '挑戦', yomi: 'ちょうせん', imi: '困難に立ち向かって試みること' },
            { id: 21, kanji: '統一', yomi: 'とういつ', imi: 'バラバラなものを一つにまとめること' },
            { id: 22, kanji: '判断', yomi: 'はんだん', imi: '情報から適切な結論を出すこと' },
            { id: 23, kanji: '変化', yomi: 'へんか', imi: '状態や性質が変わること' },
            { id: 24, kanji: '保護', yomi: 'ほご', imi: '危害から守り助けること' },
            { id: 25, kanji: '本質', yomi: 'ほんしつ', imi: 'ものの最も大切な性質' },
            { id: 26, kanji: '誤解', yomi: 'ごかい', imi: '相手の意図を間違って理解すること' },
            { id: 27, kanji: '悟り', yomi: 'さとり', imi: '深く理解し真理を知ること' },
            { id: 28, kanji: '高潔', yomi: 'こうけつ', imi: '心が清くて高い志を持つこと' },
            { id: 29, kanji: '刻苦', yomi: 'こっく', imi: '苦しみながらも努力すること' },
            { id: 30, kanji: '感謝', yomi: 'かんしゃ', imi: '相手の恩や親切に対する感情' },
            { id: 31, kanji: '緊張', yomi: 'きんちょう', imi: '心身が引き締まった状態' },
            { id: 32, kanji: '計画', yomi: 'けいかく', imi: '事前に行動の内容を立てること' },
            { id: 33, kanji: '経験', yomi: 'けいけん', imi: '実際に経て得た知識や技術' },
            { id: 34, kanji: '健康', yomi: 'けんこう', imi: '体や心が良い状態であること' },
            { id: 35, kanji: '結果', yomi: 'けっか', imi: '行動がもたらした最終的な状態' },
            { id: 36, kanji: '決意', yomi: 'けつい', imi: '心を決めて何かをしようとする気持ち' },
            { id: 37, kanji: '兼任', yomi: 'けんにん', imi: '複数の役目を同時に担当すること' },
            { id: 38, kanji: '献身', yomi: 'けんしん', imi: '身も心も相手のために捧げること' },
            { id: 39, kanji: '言葉', yomi: 'ことば', imi: '意思や考えを表すための音や文字' },
            { id: 40, kanji: '感情', yomi: 'かんじょう', imi: '喜怒哀楽などの心の動き' },
        ];

        // メニュー画面コンポーネント
        function MenuScreen({ onSelectSet, onReview, checkedCount }) {
            const sets = [];
            for (let i = 0; i < Math.ceil(kokugoData.length / 20); i++) {
                const start = i * 20 + 1;
                const end = Math.min((i + 1) * 20, kokugoData.length);
                sets.push({ number: i + 1, start, end });
            }

            return (
                <div className="min-h-screen bg-gradient-to-b from-blue-50 to-blue-100 p-4 pt-8 flex flex-col">
                    {/* ヘッダー */}
                    <div className="text-center mb-8">
                        <h1 className="text-3xl font-bold text-gray-800 mb-2">漢字検定</h1>
                        <p className="text-gray-600">2字熟語学習アプリ</p>
                    </div>

                    {/* 復習ボタン */}
                    {checkedCount > 0 && (
                        <button
                            onClick={onReview}
                            className="w-full bg-orange-500 text-white rounded-lg shadow-md p-4 mb-4 font-bold hover:bg-orange-600 transition-all"
                        >
                            復習する ({checkedCount} 問)
                        </button>
                    )}

                    {/* セット一覧 */}
                    <div className="flex-1 flex flex-col gap-3 mb-4">
                        {sets.map(set => (
                            <button
                                key={set.number}
                                onClick={() => onSelectSet(set.number - 1)}
                                className="w-full bg-white rounded-lg shadow-md p-6 text-left hover:shadow-lg transition-shadow"
                            >
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-lg font-bold text-blue-600">
                                            セット {set.number}
                                        </p>
                                        <p className="text-sm text-gray-600">
                                            問題 {set.start} - {set.end}
                                        </p>
                                    </div>
                                    <div className="text-2xl text-gray-400">→</div>
                                </div>
                            </button>
                        ))}
                    </div>

                    {/* フッター */}
                    <div className="text-center text-xs text-gray-500">
                        全 {kokugoData.length} 問
                    </div>
                </div>
            );
        }

        // 復習画面コンポーネント
        function ReviewScreen({ currentIndex, reviewData, onNext, onBackToMenu }) {
            const [isAnswerShown, setIsAnswerShown] = useState(false);
            const currentItem = reviewData[currentIndex];

            if (!currentItem) {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-blue-50 to-blue-100 p-4 pt-8 flex flex-col">
                        <div className="flex-1 flex flex-col items-center justify-center gap-4">
                            <p className="text-xl text-gray-800 font-bold">
                                復習が完了しました！
                            </p>
                            <button
                                onClick={onBackToMenu}
                                className="bg-blue-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-600"
                            >
                                メニューに戻る
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-b from-blue-50 to-blue-100 p-4 pt-12 flex flex-col">
                    {/* ヘッダー */}
                    <div className="text-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-800">復習モード</h1>
                        <p className="text-sm text-gray-600">
                            問題 {currentIndex + 1}/{reviewData.length}
                        </p>
                    </div>

                    {/* メイン復習エリア */}
                    <div className="flex-1 flex flex-col items-center justify-center gap-8 mb-8">
                        {/* 熟語表示 または 解答表示 */}
                        <div className="w-full max-w-sm">
                            {!isAnswerShown ? (
                                <div className="bg-white rounded-lg shadow-lg p-12 text-center">
                                    <p className="text-gray-600 text-sm mb-6">問題</p>
                                    <p className="text-7xl font-bold text-blue-600">
                                        {currentItem.kanji}
                                    </p>
                                </div>
                            ) : (
                                <div className="bg-gradient-to-br from-green-100 to-green-50 rounded-lg shadow-lg p-8">
                                    <div className="text-center">
                                        <p className="text-4xl font-bold text-green-600 mb-4">
                                            {currentItem.kanji}
                                        </p>
                                        <div className="border-t-2 border-green-300 pt-6 mt-6">
                                            <p className="text-gray-700 text-sm mb-2">【読み方】</p>
                                            <p className="text-2xl font-semibold text-green-700 mb-6">
                                                {currentItem.yomi}
                                            </p>
                                            <p className="text-gray-700 text-sm mb-2">【意味】</p>
                                            <p className="text-base text-gray-800 leading-relaxed">
                                                {currentItem.imi}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 進捗インジケーター */}
                        <div className="w-full max-w-sm">
                            <div className="bg-gray-200 rounded-full h-2">
                                <div
                                    className="bg-orange-500 h-2 rounded-full transition-all"
                                    style={{
                                        width: `${((currentIndex + 1) / reviewData.length) * 100}%`,
                                    }}
                                ></div>
                            </div>
                        </div>
                    </div>

                    {/* 次へボタン */}
                    <div className="flex flex-col gap-3 w-full max-w-sm mx-auto mb-6">
                        <button
                            onClick={() => {
                                if (!isAnswerShown) {
                                    setIsAnswerShown(true);
                                } else {
                                    setIsAnswerShown(false);
                                    onNext();
                                }
                            }}
                            className="w-full py-4 rounded-lg font-bold text-white text-lg bg-orange-500 shadow-md hover:bg-orange-600 active:scale-95 transition-all"
                        >
                            {isAnswerShown ? '次へ' : '解答を見る'}
                        </button>
                    </div>

                    {/* メニューに戻るボタン */}
                    <div className="text-center mb-4">
                        <button
                            onClick={onBackToMenu}
                            className="text-blue-600 hover:text-blue-800 font-semibold text-sm underline"
                        >
                            ← メニューに戻る
                        </button>
                    </div>
                </div>
            );
        }

        // 問題画面コンポーネント
        function QuestionScreen({ setNumber, currentIndex, onNext, onBackToMenu, isChecked, onToggleCheck }) {
            const setStartIndex = setNumber * 20;
            const setEndIndex = Math.min((setNumber + 1) * 20, kokugoData.length);
            const currentSetData = kokugoData.slice(setStartIndex, setEndIndex);
            const currentItem = currentSetData[currentIndex];

            if (!currentItem) {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-blue-50 to-blue-100 p-4 pt-8 flex flex-col">
                        <div className="flex-1 flex flex-col items-center justify-center gap-4">
                            <p className="text-xl text-gray-800 font-bold">
                                セット {setNumber + 1} が完了しました！
                            </p>
                            <button
                                onClick={onBackToMenu}
                                className="bg-blue-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-600"
                            >
                                メニューに戻る
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-b from-blue-50 to-blue-100 p-4 pt-12 flex flex-col">
                    {/* ヘッダー */}
                    <div className="text-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-800">漢字検定 3級</h1>
                        <p className="text-sm text-gray-600">
                            セット {setNumber + 1} / 問題 {currentIndex + 1}/{currentSetData.length}
                        </p>
                    </div>

                    {/* メイン問題エリア */}
                    <div className="flex-1 flex flex-col items-center justify-center gap-8 mb-8">
                        {/* 熟語表示 */}
                        <div className="w-full max-w-sm">
                            <div className="bg-white rounded-lg shadow-lg p-12 text-center">
                                <p className="text-gray-600 text-sm mb-6">問題</p>
                                <p className="text-7xl font-bold text-blue-600">
                                    {currentItem.kanji}
                                </p>
                            </div>
                        </div>

                        {/* 進捗インジケーター */}
                        <div className="w-full max-w-sm">
                            <div className="bg-gray-200 rounded-full h-2">
                                <div
                                    className="bg-blue-500 h-2 rounded-full transition-all"
                                    style={{
                                        width: `${((currentIndex + 1) / currentSetData.length) * 100}%`,
                                    }}
                                ></div>
                            </div>
                        </div>
                    </div>

                    {/* ボタンと チェックボックス */}
                    <div className="flex gap-4 items-center justify-center w-full max-w-sm mx-auto mb-6">
                        {/* 次へ ボタン */}
                        <button
                            onClick={onNext}
                            className="flex-1 py-4 rounded-lg font-bold text-white text-lg bg-blue-500 shadow-md hover:bg-blue-600 active:scale-95 transition-all"
                        >
                            次へ
                        </button>

                        {/* わからなかった テキスト */}
                        <span className="text-sm text-gray-700">わからなかった</span>

                        {/* チェックボックス */}
                        <input
                            type="checkbox"
                            checked={isChecked}
                            onChange={onToggleCheck}
                            className="w-6 h-6 cursor-pointer"
                        />
                    </div>

                    {/* メニューに戻るボタン */}
                    <div className="text-center mb-4">
                        <button
                            onClick={onBackToMenu}
                            className="text-blue-600 hover:text-blue-800 font-semibold text-sm underline"
                        >
                            ← メニューに戻る
                        </button>
                    </div>
                </div>
            );
        }

        // 解答画面コンポーネント
        function AnswerScreen({ setNumber, currentIndex, onNext, onBackToMenu }) {
            const setStartIndex = setNumber * 20;
            const setEndIndex = Math.min((setNumber + 1) * 20, kokugoData.length);
            const currentSetData = kokugoData.slice(setStartIndex, setEndIndex);
            const currentItem = currentSetData[currentIndex];

            if (!currentItem) {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-blue-50 to-blue-100 p-4 pt-8 flex flex-col">
                        <div className="flex-1 flex flex-col items-center justify-center gap-4">
                            <p className="text-xl text-gray-800 font-bold">
                                セット {setNumber + 1} が完了しました！
                            </p>
                            <button
                                onClick={onBackToMenu}
                                className="bg-blue-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-600"
                            >
                                メニューに戻る
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-b from-blue-50 to-blue-100 p-4 pt-12 flex flex-col">
                    {/* ヘッダー */}
                    <div className="text-center mb-6">
                        <h1 className="text-2xl font-bold text-gray-800">漢字検定 3級</h1>
                        <p className="text-sm text-gray-600">
                            セット {setNumber + 1} / 問題 {currentIndex + 1}/{currentSetData.length}
                        </p>
                    </div>

                    {/* メイン解答エリア */}
                    <div className="flex-1 flex flex-col items-center justify-center gap-8 mb-8">
                        {/* 解答画面 */}
                        <div className="w-full max-w-sm">
                            <div className="bg-gradient-to-br from-green-100 to-green-50 rounded-lg shadow-lg p-8">
                                <div className="text-center">
                                    <p className="text-4xl font-bold text-green-600 mb-4">
                                        {currentItem.kanji}
                                    </p>
                                    <div className="border-t-2 border-green-300 pt-6 mt-6">
                                        <p className="text-gray-700 text-sm mb-2">【読み方】</p>
                                        <p className="text-2xl font-semibold text-green-700 mb-6">
                                            {currentItem.yomi}
                                        </p>
                                        <p className="text-gray-700 text-sm mb-2">【意味】</p>
                                        <p className="text-base text-gray-800 leading-relaxed">
                                            {currentItem.imi}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 進捗インジケーター */}
                        <div className="w-full max-w-sm">
                            <div className="bg-gray-200 rounded-full h-2">
                                <div
                                    className="bg-blue-500 h-2 rounded-full transition-all"
                                    style={{
                                        width: `${((currentIndex + 1) / currentSetData.length) * 100}%`,
                                    }}
                                ></div>
                            </div>
                        </div>
                    </div>

                    {/* 次へボタン */}
                    <div className="flex flex-col gap-3 w-full max-w-sm mx-auto mb-6">
                        <button
                            onClick={onNext}
                            className="w-full py-4 rounded-lg font-bold text-white text-lg bg-blue-500 shadow-md hover:bg-blue-600 active:scale-95 transition-all"
                        >
                            次へ
                        </button>
                    </div>

                    {/* メニューに戻るボタン */}
                    <div className="text-center mb-4">
                        <button
                            onClick={onBackToMenu}
                            className="text-blue-600 hover:text-blue-800 font-semibold text-sm underline"
                        >
                            ← メニューに戻る
                        </button>
                    </div>
                </div>
            );
        }

        // メインアプリコンポーネント
        function KanjiLearningApp() {
            const [screen, setScreen] = useState('menu'); // 'menu', 'question', 'answer', 'review'
            const [selectedSet, setSelectedSet] = useState(0);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [checkedItems, setCheckedItems] = useState({});
            const [reviewData, setReviewData] = useState([]);

            // ローカルストレージから復習対象を復元
            useEffect(() => {
                const saved = localStorage.getItem('kanjiCheckedItems');
                if (saved) {
                    setCheckedItems(JSON.parse(saved));
                }
            }, []);

            // チェック状態を保存
            useEffect(() => {
                localStorage.setItem('kanjiCheckedItems', JSON.stringify(checkedItems));
            }, [checkedItems]);

            const handleSelectSet = (setNumber) => {
                setSelectedSet(setNumber);
                setCurrentIndex(0);
                setScreen('question');
            };

            const handleReview = () => {
                // チェック済みの漢字だけをフィルタリング
                const checked = kokugoData.filter(item => checkedItems[`item_${item.id}`]);
                setReviewData(checked);
                setCurrentIndex(0);
                setScreen('review');
            };

            const handleNext = () => {
                if (screen === 'question') {
                    setScreen('answer');
                } else if (screen === 'answer') {
                    const setStartIndex = selectedSet * 20;
                    const setEndIndex = Math.min((selectedSet + 1) * 20, kokugoData.length);
                    const currentSetData = kokugoData.slice(setStartIndex, setEndIndex);

                    if (currentIndex + 1 < currentSetData.length) {
                        setCurrentIndex(currentIndex + 1);
                        setScreen('question');
                    } else {
                        // セット完了
                        setScreen('question');
                    }
                } else if (screen === 'review') {
                    if (currentIndex + 1 < reviewData.length) {
                        setCurrentIndex(currentIndex + 1);
                    } else {
                        // 復習完了
                        setScreen('menu');
                    }
                }
            };

            const handleToggleCheck = () => {
                const setStartIndex = selectedSet * 20;
                const currentSetData = kokugoData.slice(setStartIndex, Math.min((selectedSet + 1) * 20, kokugoData.length));
                const currentItem = currentSetData[currentIndex];
                const key = `item_${currentItem.id}`;

                setCheckedItems(prev => ({
                    ...prev,
                    [key]: !prev[key]
                }));
            };

            const handleBackToMenu = () => {
                setScreen('menu');
                setCurrentIndex(0);
            };

            const checkedCount = Object.values(checkedItems).filter(Boolean).length;

            // 通常学習の現在アイテム
            const setStartIndex = selectedSet * 20;
            const currentSetData = kokugoData.slice(setStartIndex, Math.min((selectedSet + 1) * 20, kokugoData.length));
            const currentItem = screen === 'review' ? reviewData[currentIndex] : currentSetData[currentIndex];
            const currentItemKey = currentItem ? `item_${currentItem.id}` : null;
            const isChecked = currentItemKey ? !!checkedItems[currentItemKey] : false;

            if (screen === 'menu') {
                return <MenuScreen onSelectSet={handleSelectSet} onReview={handleReview} checkedCount={checkedCount} />;
            } else if (screen === 'question') {
                return <QuestionScreen
                    setNumber={selectedSet}
                    currentIndex={currentIndex}
                    onNext={handleNext}
                    onBackToMenu={handleBackToMenu}
                    isChecked={isChecked}
                    onToggleCheck={handleToggleCheck}
                />;
            } else if (screen === 'answer') {
                return <AnswerScreen
                    setNumber={selectedSet}
                    currentIndex={currentIndex}
                    onNext={handleNext}
                    onBackToMenu={handleBackToMenu}
                />;
            } else if (screen === 'review') {
                return <ReviewScreen
                    currentIndex={currentIndex}
                    reviewData={reviewData}
                    onNext={handleNext}
                    onBackToMenu={handleBackToMenu}
                />;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KanjiLearningApp />);
    </script>
</body>
</html>
