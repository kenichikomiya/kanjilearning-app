<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字検定 学習アプリ - 3級対策</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        input, textarea, button {
            -webkit-user-select: text;
            user-select: text;
        }
        body {
            font-family: 'Segoe UI', 'ヒラギノ角ゴ Pro', 'Hiragino Kaku Gothic Pro', 'YuGothic', 'Yu Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, useRef } = React;

        function KanjiLearningApp() {
            const [data, setData] = useState([]);
            const [currentSet, setCurrentSet] = useState(0);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [showMeaning, setShowMeaning] = useState(false);
            const [learningRecord, setLearningRecord] = useState({});
            const [touchStart, setTouchStart] = useState({ x: 0, y: 0 });
            const [touchEnd, setTouchEnd] = useState({ x: 0, y: 0 });
            const [isPressed, setIsPressed] = useState(false);
            const [showAnswerAfterUnlearn, setShowAnswerAfterUnlearn] = useState(false);
            const pressTimerRef = useRef(null);
            const minSwipeDistance = 50;

            // データの読み込み
            useEffect(() => {
                const kokugoData = [
                    { id: 1, kanji: '哀哀父母', yomi: 'あいあいふぼ', imi: '自分を生んで苦労を重ねてくれた父母の死を悼む', difficulty: 'kyu3' },
                    { id: 2, kanji: '哀糸豪竹', yomi: 'あいしごうちく', imi: '管弦の調和が人を感動させること', difficulty: 'kyu3' },
                    { id: 3, kanji: '愛多憎生', yomi: 'あいたぞうせい', imi: '愛が多すぎると憎しみが生まれる', difficulty: 'kyu3' },
                    { id: 4, kanji: '安穏無事', yomi: 'あんのんぶじ', imi: '何事もなく暮らしが穏やか', difficulty: 'kyu3' },
                    { id: 5, kanji: '衣冠盛事', yomi: 'いかんせいじ', imi: '家の名声を引き継ぐこと', difficulty: 'kyu3' },
                    { id: 6, kanji: '意気衝天', yomi: 'いきしょうてん', imi: '気力が高く充実している', difficulty: 'kyu3' },
                    { id: 7, kanji: '意気自如', yomi: 'いきじじょ', imi: '心の持ち方が平静', difficulty: 'kyu3' },
                    { id: 8, kanji: '意気揚揚', yomi: 'いきようよう', imi: '威勢よく誇らしげに振る舞う', difficulty: 'kyu3' },
                    { id: 9, kanji: '一栄一辱', yomi: 'いちえいいちじょく', imi: '良い時もあれば悪い時もある', difficulty: 'kyu3' },
                    { id: 10, kanji: '一言芳恩', yomi: 'いちごんほうおん', imi: 'ひと言声をかけてくれたことに感謝', difficulty: 'kyu3' },
                    { id: 11, kanji: '一樹百穫', yomi: 'いちじゅひゃっかく', imi: '人材育成は大きな利益につながる', difficulty: 'kyu3' },
                    { id: 12, kanji: '一諾千金', yomi: 'いちだくせんきん', imi: '一度の約束は千金の価値', difficulty: 'kyu3' },
                    { id: 13, kanji: '一了百了', yomi: 'いちりょうひゃくりょう', imi: '一つ解決すれば全て解決', difficulty: 'kyu3' },
                    { id: 14, kanji: '一喜一憂', yomi: 'いっきいちゆう', imi: '状況変化で喜んだり心配したり', difficulty: 'kyu3' },
                    { id: 15, kanji: '一騎当千', yomi: 'いっきとうせん', imi: '並外れた能力を持つ人', difficulty: 'kyu3' },
                    { id: 16, kanji: '一球入魂', yomi: 'いっきゅうにゅうこん', imi: '野球で一球に精神を集中', difficulty: 'kyu3' },
                    { id: 17, kanji: '一虚一実', yomi: 'いっきょいちじつ', imi: '様々に変化し予測が難しい', difficulty: 'kyu3' },
                    { id: 18, kanji: '空中楼閣', yomi: 'くうちゅうのろうかく', imi: '根拠のない非現実的な考え', difficulty: 'kyu3' },
                    { id: 19, kanji: '苦口婆心', yomi: 'くこうばしん', imi: '相手を思い何度も教えさとす', difficulty: 'kyu3' },
                    { id: 20, kanji: '愚公移山', yomi: 'ぐこういざん', imi: '努力し続ければ必ず成功', difficulty: 'kyu3' },
                ];

                setData(kokugoData);

                // ローカルストレージから学習記録を復元
                const saved = localStorage.getItem('kanjiLearningRecord');
                if (saved) {
                    setLearningRecord(JSON.parse(saved));
                }
            }, []);

            // 学習記録を保存
            useEffect(() => {
                localStorage.setItem('kanjiLearningRecord', JSON.stringify(learningRecord));
            }, [learningRecord]);

            // 現在のセット（20問ごと）
            const currentSetData = data.slice(currentSet * 20, (currentSet + 1) * 20);
            const currentItem = currentSetData[currentIndex];
            const recordKey = currentItem ? `item_${currentItem.id}` : null;
            const recordStatus = recordKey ? learningRecord[recordKey] : null;

            // フリック処理
            const handleTouchStart = (e) => {
                setTouchStart({ x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY });
            };

            const handleTouchEnd = (e) => {
                setTouchEnd({ x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY });
                handleSwipe();
            };

            const handleSwipe = () => {
                const distance = {
                    x: touchStart.x - touchEnd.x,
                    y: touchStart.y - touchEnd.y,
                };

                const isLeftSwipe = distance.x > minSwipeDistance;
                const isRightSwipe = distance.x < -minSwipeDistance;
                const isUpSwipe = distance.y > minSwipeDistance;
                const isDownSwipe = distance.y < -minSwipeDistance;

                if (showMeaning) {
                    if (isUpSwipe || isLeftSwipe) {
                        markAsLearned();
                    } else if (isDownSwipe || isRightSwipe) {
                        setShowMeaning(false);
                    }
                }
            };

            // 「覚えた」ボタン長押し処理
            const handleLearned = () => {
                setIsPressed(true);
                setShowMeaning(true);
            };

            const handleLearnedup = () => {
                setIsPressed(false);
                setShowMeaning(false);
            };

            // 「覚えていない」ボタン処理
            const handleUnlearn = () => {
                if (showAnswerAfterUnlearn) {
                    nextQuestion();
                    setShowAnswerAfterUnlearn(false);
                    setShowMeaning(false);
                } else {
                    setShowAnswerAfterUnlearn(true);
                    setShowMeaning(true);
                }
            };

            // 正解：次へ
            const markAsLearned = () => {
                setLearningRecord(prev => ({
                    ...prev,
                    [recordKey]: 'learned'
                }));
                nextQuestion();
            };

            // 次の問題へ
            const nextQuestion = () => {
                if (currentIndex < currentSetData.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    setShowMeaning(false);
                    setShowAnswerAfterUnlearn(false);
                } else {
                    alert(`セット ${currentSet + 1} が完了しました！`);
                    if (currentSet < Math.ceil(data.length / 20) - 1) {
                        setCurrentSet(currentSet + 1);
                        setCurrentIndex(0);
                        setShowMeaning(false);
                        setShowAnswerAfterUnlearn(false);
                    }
                }
            };

            if (!currentItem) {
                return React.createElement('div', { className: 'flex items-center justify-center h-screen bg-gray-100' }, '読み込み中...');
            }

            return React.createElement(
                'div',
                { className: 'min-h-screen bg-gradient-to-b from-blue-50 to-blue-100 p-4 flex flex-col' },
                // ヘッダー
                React.createElement(
                    'div',
                    { className: 'text-center mb-4' },
                    React.createElement('h1', { className: 'text-2xl font-bold text-gray-800' }, '漢字検定 3級'),
                    React.createElement('p', { className: 'text-sm text-gray-600' }, `セット ${currentSet + 1} / 問題 ${currentIndex + 1}/${currentSetData.length}`)
                ),
                // メイン学習エリア
                React.createElement(
                    'div',
                    {
                        className: 'flex-1 flex flex-col items-center justify-center gap-8 mb-8',
                        onTouchStart: handleTouchStart,
                        onTouchEnd: handleTouchEnd,
                    },
                    // 熟語表示
                    React.createElement(
                        'div',
                        { className: 'w-full max-w-sm' },
                        !showMeaning
                            ? React.createElement(
                                'div',
                                { className: 'bg-white rounded-lg shadow-lg p-8 text-center' },
                                React.createElement('p', { className: 'text-gray-600 text-sm mb-4' }, '問題'),
                                React.createElement('p', { className: 'text-6xl font-bold text-blue-600 mb-4' }, currentItem.kanji),
                                React.createElement('p', { className: 'text-gray-500 text-sm' }, '読みと意味を確認するには「覚えた」を押し続けてください')
                            )
                            : React.createElement(
                                'div',
                                { className: 'bg-gradient-to-br from-green-100 to-green-50 rounded-lg shadow-lg p-8' },
                                React.createElement(
                                    'div',
                                    { className: 'text-center' },
                                    React.createElement('p', { className: 'text-4xl font-bold text-green-600 mb-4' }, currentItem.kanji),
                                    React.createElement(
                                        'div',
                                        { className: 'border-t-2 border-green-300 pt-6 mt-6' },
                                        React.createElement('p', { className: 'text-gray-700 text-sm mb-2' }, '【読み方】'),
                                        React.createElement('p', { className: 'text-2xl font-semibold text-green-700 mb-6' }, currentItem.yomi),
                                        React.createElement('p', { className: 'text-gray-700 text-sm mb-2' }, '【意味】'),
                                        React.createElement('p', { className: 'text-base text-gray-800 leading-relaxed' }, currentItem.imi)
                                    )
                                ),
                                React.createElement('p', { className: 'text-xs text-gray-500 text-center mt-6' }, '上/左にフリック → 次へ | 下/右にフリック → もう一度')
                            )
                    ),
                    // 進捗インジケーター
                    React.createElement(
                        'div',
                        { className: 'w-full max-w-sm' },
                        React.createElement(
                            'div',
                            { className: 'bg-gray-200 rounded-full h-2' },
                            React.createElement('div', {
                                className: 'bg-blue-500 h-2 rounded-full transition-all',
                                style: { width: `${((currentIndex + 1) / currentSetData.length) * 100}%` }
                            })
                        )
                    )
                ),
                // ボタンエリア
                React.createElement(
                    'div',
                    { className: 'flex gap-4 justify-center w-full max-w-sm mx-auto mb-4' },
                    // 「覚えた」ボタン
                    React.createElement(
                        'button',
                        {
                            onMouseDown: handleLearned,
                            onMouseUp: handleLearnedup,
                            onMouseLeave: handleLearnedup,
                            onTouchStart: handleLearned,
                            onTouchEnd: handleLearnedup,
                            className: `flex-1 py-4 rounded-lg font-bold text-white text-lg transition-all ${
                                isPressed
                                    ? 'bg-blue-600 scale-95 shadow-inner'
                                    : 'bg-blue-500 shadow-md hover:bg-blue-600 active:scale-95'
                            }`
                        },
                        '覚えた'
                    ),
                    // 「覚えていない」ボタン
                    React.createElement(
                        'button',
                        {
                            onClick: handleUnlearn,
                            className: `flex-1 py-4 rounded-lg font-bold text-white text-lg transition-all ${
                                showAnswerAfterUnlearn
                                    ? 'bg-orange-600 shadow-md'
                                    : 'bg-orange-500 shadow-md hover:bg-orange-600 active:scale-95'
                            }`
                        },
                        showAnswerAfterUnlearn ? '次へ' : '覚えていない'
                    )
                ),
                // 学習状況
                recordStatus && React.createElement(
                    'div',
                    { className: 'text-center text-sm text-green-600' },
                    '✓ この問題は覚えました'
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(KanjiLearningApp));
    </script>
</body>
</html>
